# Reproducible static query recipes for UC-2, mirroring the toxicity-oriented compound ranking use case.
button_label: View Queries
title: UC-2 Query Recipes (Most Toxic Compounds)
introduction: Reproduce UC-2 ranking using only real endpoint prediction values
  (single endpoint or endpoint-group peak).
recipes:
  - id: sqlite_query
    label: SQLite Query
    description: Parameterized ranking based on endpoint values from
      toxicity_endpoint (no mean aggregation).
    language: sql
    runtime: sqlite
    code: >-
      WITH params AS (
        -- risk_mode: 'endpoint' or 'group_peak'
        -- endpoint_group: 'all', 'ecotoxicity', 'genotoxicity_carcinogenicity', 'nuclear_receptors', 'stress_response', 'organ_irritation', 'other'
        SELECT
          'endpoint' AS risk_mode,
          'all' AS endpoint_group,
          'avian' AS endpoint
      ),

      endpoint_scoped AS (
        SELECT
          te.cpd,
          te.endpoint,
          te.value
        FROM toxicity_endpoint te
        CROSS JOIN params p
        WHERE te.value IS NOT NULL
          AND (
            p.endpoint_group = 'all'
            OR (
              p.endpoint_group = 'ecotoxicity'
              AND te.endpoint IN ('avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation')
            )
            OR (
              p.endpoint_group = 'genotoxicity_carcinogenicity'
              AND te.endpoint IN ('genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus')
            )
            OR (
              p.endpoint_group = 'nuclear_receptors'
              AND te.endpoint IN ('nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr')
            )
            OR (
              p.endpoint_group = 'stress_response'
              AND te.endpoint IN ('sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53')
            )
            OR (
              p.endpoint_group = 'organ_irritation'
              AND te.endpoint IN ('eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor')
            )
            OR (
              p.endpoint_group = 'other'
              AND te.endpoint NOT IN (
                'avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation',
                'genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus',
                'nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr',
                'sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53',
                'eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor'
              )
            )
          )
      ),

      grouped_max AS (
        SELECT
          cpd,
          MAX(value) AS y_value
        FROM endpoint_scoped
        GROUP BY cpd
      ),

      grouped_choice AS (
        SELECT
          es.cpd,
          MIN(es.endpoint) AS endpoint_used
        FROM endpoint_scoped es
        JOIN grouped_max gm
          ON gm.cpd = es.cpd
         AND gm.y_value = es.value
        GROUP BY es.cpd
      ),

      metric AS (
        SELECT
          cs.cpd,
          cs.compoundname,
          cs.compoundclass,
          cs.gene_count,
          cs.pathway_count,
          CASE
            WHEN p.risk_mode = 'endpoint' THEN se.value
            ELSE gm.y_value
          END AS y_value,
          CASE
            WHEN p.risk_mode = 'endpoint' THEN p.endpoint
            ELSE gc.endpoint_used
          END AS endpoint_used
        FROM compound_summary cs
        CROSS JOIN params p
        LEFT JOIN toxicity_endpoint se
          ON se.cpd = cs.cpd
         AND se.endpoint = p.endpoint
        LEFT JOIN grouped_max gm
          ON gm.cpd = cs.cpd
        LEFT JOIN grouped_choice gc
          ON gc.cpd = cs.cpd
      )

      SELECT
        cpd,
        compoundname,
        compoundclass,
        gene_count,
        pathway_count,
        endpoint_used,
        y_value
      FROM metric

      WHERE y_value IS NOT NULL

      ORDER BY y_value DESC, gene_count DESC, cpd ASC

      ;
  - id: python_sqlite
    label: Python + SQLite
    description: Python sqlite3 script for UC-2 with selectable mode and endpoint context.
    language: python
    runtime: sqlite
    code: >-
      import json

      import sqlite3


      db_path = "data/biorempp.sqlite"

      query = """

      WITH params AS (
        -- risk_mode: 'endpoint' or 'group_peak'
        -- endpoint_group: 'all', 'ecotoxicity', 'genotoxicity_carcinogenicity', 'nuclear_receptors', 'stress_response', 'organ_irritation', 'other'
        SELECT
          'endpoint' AS risk_mode,
          'all' AS endpoint_group,
          'avian' AS endpoint
      ),

      endpoint_scoped AS (
        SELECT
          te.cpd,
          te.endpoint,
          te.value
        FROM toxicity_endpoint te
        CROSS JOIN params p
        WHERE te.value IS NOT NULL
          AND (
            p.endpoint_group = 'all'
            OR (
              p.endpoint_group = 'ecotoxicity'
              AND te.endpoint IN ('avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation')
            )
            OR (
              p.endpoint_group = 'genotoxicity_carcinogenicity'
              AND te.endpoint IN ('genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus')
            )
            OR (
              p.endpoint_group = 'nuclear_receptors'
              AND te.endpoint IN ('nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr')
            )
            OR (
              p.endpoint_group = 'stress_response'
              AND te.endpoint IN ('sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53')
            )
            OR (
              p.endpoint_group = 'organ_irritation'
              AND te.endpoint IN ('eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor')
            )
            OR (
              p.endpoint_group = 'other'
              AND te.endpoint NOT IN (
                'avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation',
                'genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus',
                'nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr',
                'sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53',
                'eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor'
              )
            )
          )
      ),

      grouped_max AS (
        SELECT
          cpd,
          MAX(value) AS y_value
        FROM endpoint_scoped
        GROUP BY cpd
      ),

      grouped_choice AS (
        SELECT
          es.cpd,
          MIN(es.endpoint) AS endpoint_used
        FROM endpoint_scoped es
        JOIN grouped_max gm
          ON gm.cpd = es.cpd
         AND gm.y_value = es.value
        GROUP BY es.cpd
      ),

      metric AS (
        SELECT
          cs.cpd,
          cs.compoundname,
          cs.compoundclass,
          cs.gene_count,
          cs.pathway_count,
          CASE
            WHEN p.risk_mode = 'endpoint' THEN se.value
            ELSE gm.y_value
          END AS y_value,
          CASE
            WHEN p.risk_mode = 'endpoint' THEN p.endpoint
            ELSE gc.endpoint_used
          END AS endpoint_used
        FROM compound_summary cs
        CROSS JOIN params p
        LEFT JOIN toxicity_endpoint se
          ON se.cpd = cs.cpd
         AND se.endpoint = p.endpoint
        LEFT JOIN grouped_max gm
          ON gm.cpd = cs.cpd
        LEFT JOIN grouped_choice gc
          ON gc.cpd = cs.cpd
      )

      SELECT
        cpd,
        compoundname,
        compoundclass,
        gene_count,
        pathway_count,
        endpoint_used,
        y_value
      FROM metric

      WHERE y_value IS NOT NULL

      ORDER BY y_value DESC, gene_count DESC, cpd ASC

      ;

      """


      with sqlite3.connect(db_path) as conn:
        conn.row_factory = sqlite3.Row
        rows = [dict(row) for row in conn.execute(query).fetchall()]

      print(json.dumps({"rows": rows}, ensure_ascii=False, sort_keys=True))
notes:
  - This UC uses only real endpoint values from toxicity_endpoint.
  - Group mode uses peak endpoint value (MAX) and not mean aggregation.
