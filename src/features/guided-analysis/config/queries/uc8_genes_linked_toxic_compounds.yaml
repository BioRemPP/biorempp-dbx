# Guided query definition for UC-8, focused on genes linked to compounds above the selected toxicity threshold.
id: uc8_genes_linked_toxic_compounds
category: gene_ko_analysis
title: Genes Linked to Toxic Compounds
question: Which genes are associated with compounds above the selected toxicity threshold?
description: Rank genes linked to compounds that pass the selected toxicity threshold.
dataset: compound_summary
executor: uc_gene_toxic_compounds_endpoint

use_case_description:
  scientific_question: >
    Which genes are linked to compounds with high predicted toxicity under the
    selected endpoint?
  description: >
    This use case combines gene-compound mappings with toxicity filters to
    highlight genes connected to compounds that exceed the current prediction
    threshold and endpoint context. It supports exploratory inspection of gene
    contexts that repeatedly co-occur with stronger predicted toxicity signals.
  visual_elements:
    - label: Gene Toxicity Ranking
      description: Horizontal bar chart shows top genes ranked by number of toxic compounds under the selected threshold.
    - label: Toxicity Boxplot per Gene
      description: Boxplot summarizes endpoint toxicity distribution per top-ranked gene under active threshold filters.
    - label: Gene Toxicity Table
      description: Table reports toxic compounds, total compounds, KO coverage, and distribution quantiles per gene.
  interpretation_guidelines:
    - Higher-ranked genes indicate stronger exploratory linkage to compounds above the active toxicity threshold.
    - Results are endpoint-context dependent and should be interpreted as exploratory signals, not causal confirmation.
    - Boxplot distributions help distinguish genes linked to a few extreme toxic compounds from genes associated with consistently elevated prediction values.
    - This view supports hypothesis generation for potentially critical environmental gene-compound relationships.
  limitations:
    - >
      Gene-level rankings are sensitive to endpoint selection and threshold
      settings, so they should be interpreted within the active toxicological
      context only.
    - >
      Associations between genes and toxic compounds do not establish causal
      toxicological mechanisms, gene regulation, or experimentally validated
      biodegradation effects.
    - >
      Predictive toxicity summaries do not encode exposure scenario, organismal
      context, or dose-response behavior.
  color_scheme: primary

methods_modal:
  button_label: View Methods
  title: "UC-8: Genes Linked to Compounds with High Predicted Toxicity Scores"
  introduction: This analysis evaluates gene-level associations with compounds above selected predicted toxicity thresholds.
  steps:
    - title: Analytical Objective
      description: Identify genes that are more frequently associated with compounds showing elevated predicted toxicity scores.
    - title: Input Data
      description: The analysis integrates gene-compound associations with endpoint-level predicted toxicity values and KO annotation context.
      bullets:
        - toxic_compound_count = number of compounds exceeding defined predicted toxicity thresholds.
        - p90_toxicity = 90th percentile of predicted toxicity scores across associated compounds.
        - Toxicity values are derived from predictive models (e.g., ToxCSM) and do not represent experimentally validated toxicity.
    - title: Filtering Strategy
      description: Filters define endpoint context and threshold window, with optional constraints on gene-level compound and KO coverage.
    - title: Metric Definition
      description: Gene-level burden is characterized by toxic_compound_count, total associated compounds, ko_count, and distribution summaries of predicted toxicity.
    - title: Ranking or Aggregation Procedure
      description: Gene-level aggregates are computed and ordered by toxic_compound_count to support comparative prioritization within the selected context.
    - title: Output Representation
      description: Outputs include summary indicators, a ranked gene visualization, distribution summaries, and a table for detailed comparison.
    - title: Interpretation Scope and Limitations
      description: Higher ranks may indicate stronger associations with predicted toxicity signals, but do not confirm causal gene-level toxicological mechanisms.
  footer_note: This use case is exploratory and should be interpreted with endpoint context, threshold sensitivity, and independent validation evidence.

defaults:
  page_size: 10
  filters:
    endpoint_group: all
    endpoint: avian
    y_value:
      min: 0

executor_config:
  bar_top_n: 15
  boxplot_top_n: 12

filters:
  - id: search
    type: search
    label: Search Gene
    placeholder: e.g. nahA or dioxygenase
  - id: endpoint_group
    type: select
    label: Endpoint Group
    provider:
      type: static
      options:
        - value: all
          label: All groups
        - value: ecotoxicity
          label: Ecotoxicity
        - value: genotoxicity_carcinogenicity
          label: Genotoxicity & Carcinogenicity
        - value: nuclear_receptors
          label: Nuclear Receptors (NR)
        - value: stress_response
          label: Stress Response (SR)
        - value: organ_irritation
          label: Organ / Irritation
        - value: other
          label: Other
  - id: endpoint
    type: dependent_select
    label: Endpoint
    depends_on: endpoint_group
    provider:
      type: query_derived
      source: toxicity_endpoints
  - id: y_value
    type: number_range
    label: Prediction Threshold
    min: 0
    max: 1
    step: 0.01
    min_placeholder: e.g. 0.50
    max_placeholder: e.g. 0.95
  - id: compound_count
    type: number_range
    label: Gene Compound Count
    min: 0
    min_placeholder: e.g. 5
    max_placeholder: e.g. 50
  - id: toxic_compound_count
    type: number_range
    label: Toxic Compound Count
    min: 0
    min_placeholder: e.g. 1
    max_placeholder: e.g. 20
  - id: ko_count
    type: number_range
    label: KO Count
    min: 0
    min_placeholder: e.g. 10
    max_placeholder: e.g. 300

summary_cards:
  - id: genes_in_scope
    label: Genes in Scope
    value_key: genes_in_scope
  - id: toxic_compounds_peak
    label: Max Toxic Compounds
    value_key: toxic_compounds_peak
  - id: endpoint_context
    label: Endpoint Context
    value_key: endpoint_context
  - id: threshold_window
    label: Threshold Window
    value_key: threshold_window

visualizations:
  - id: uc8_boxplot
    type: boxplot
    title: Toxicity Distribution per Gene
    subtitle: Boxplot by endpoint values for top-ranked genes
    data_key: toxicity_boxplot
  - id: uc8_bar
    type: horizontal_bar
    title: Genes Linked to Toxic Compounds
    subtitle: Ranked by toxic compound count
    data_key: bar_items

table:
  id: uc8_table
  title: Genes associated with toxic compounds
  subtitle: Ranked by toxic compound linkage under active endpoint context
  row_click_field: ko
  empty_message: No genes found for selected toxicity filters.
  columns:
    - id: rank
      label: Rank
      type: number
    - id: genesymbol
      label: Gene Symbol
      type: text
    - id: gene_name
      label: Gene Name
      type: text
    - id: toxic_compound_count
      label: Toxic Compounds
      type: number
    - id: compound_count
      label: Total Compounds
      type: number
    - id: median_toxicity
      label: Median Toxicity
      type: number
    - id: p90_toxicity
      label: P90 Toxicity
      type: number
    - id: ko_count
      label: KO Count
      type: number
    - id: max_prediction
      label: Max Prediction
      type: number
