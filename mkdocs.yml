site_name: BioRemPP Documentation
site_description: >-
  BioRemPPDBX documentation for the database explorer, generated source reference,
  and internal implementation guidance.
docs_dir: docs
site_dir: site
repo_url: https://github.com/BioRemPP/biorempp-dbx
repo_name: BioRemPP/biorempp-dbx
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow
plugins:
  - search:
      lang: en
not_in_nav: |
  /deployment/*
  /guided-analysis.md
  /includes/*
  /reference/source/generated/README.md
  /reference/source/generated/**/functions/*
  /reference/source/generated/**/interfaces/*
  /reference/source/generated/**/type-aliases/*
  /reference/source/generated/**/variables/*
  /reference/source/generated/**/classes/*
  /reference/source/generated/**/enumerations/*
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
